<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320"
     font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/><stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="320" rx="14" fill="url(#bg)"/>

  <!-- three subpath cards: w=230 h=104 y=58 ; /kv x=70 cx=185, /vector x=335 cx=450, /sqlite x=600 cx=715 -->
  <g>
    <rect x="70" y="58" width="230" height="104" rx="13" fill="#0e1626" stroke="#243250" stroke-width="1.5"/>
    <rect x="70" y="58" width="230" height="4" rx="2" fill="#2bd4ff"/>
    <text x="185" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#eaf1ff">@mirk/store/kv</text>
    <text x="185" y="122" text-anchor="middle" font-size="12.5" fill="#8aa0c4">SyncStore · InMemoryKv</text>
    <text x="185" y="142" text-anchor="middle" font-size="12.5" fill="#8aa0c4">key-value + collections</text>
  </g>
  <g>
    <rect x="335" y="58" width="230" height="104" rx="13" fill="#0e1626" stroke="#243250" stroke-width="1.5"/>
    <rect x="335" y="58" width="230" height="4" rx="2" fill="#2bd4ff"/>
    <text x="450" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#eaf1ff">@mirk/store/vector</text>
    <text x="450" y="122" text-anchor="middle" font-size="12.5" fill="#8aa0c4">VectorStore · InMemory</text>
    <text x="450" y="142" text-anchor="middle" font-size="12.5" fill="#8aa0c4">cosine similarity</text>
  </g>
  <g>
    <rect x="600" y="58" width="230" height="104" rx="13" fill="#0e1626" stroke="#3a2415" stroke-width="1.5"/>
    <rect x="600" y="58" width="230" height="4" rx="2" fill="#ff7a18"/>
    <text x="715" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#ffd9b8">@mirk/store/sqlite</text>
    <text x="715" y="122" text-anchor="middle" font-size="12.5" fill="#caa183">SqliteAdapter</text>
    <text x="715" y="142" text-anchor="middle" font-size="12.5" fill="#caa183">.kv + .vector facets</text>
  </g>

  <!-- verdicts under each: ports are native-free; the adapter is the one that pulls bindings -->
  <text x="185" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#9ce8ff">zero native deps</text>
  <text x="450" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#9ce8ff">zero native deps</text>
  <g>
    <rect x="612" y="186" width="206" height="40" rx="9" fill="#16100a" stroke="#3a2415" stroke-width="1.5"/>
    <text x="715" y="203" text-anchor="middle" font-size="12" font-weight="700" fill="#ffce9e">native — optional peers</text>
    <text x="715" y="219" text-anchor="middle" font-size="11.5" fill="#caa183">better-sqlite3 · sqlite-vec</text>
  </g>

  <text x="450" y="276" text-anchor="middle" font-size="13" fill="#6f84a8">Import a port subpath and no native binding enters your bundle — native code lives only in the sqlite adapter.</text>
</svg>
